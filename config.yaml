corpus_files:
  - data/train.txt
tokenizer_corpus_files:
  - data/input.txt
tokenizer_file:       out/tokenizer.json
tokenized_cache_dir:  out/tokenized_cache
model_save_dir:       out/checkpoints
log_dir:              out/logs

vocab_size:        10000
min_frequency:     2
add_bos:           true
add_eos:           true
stop_at_eos:       true

block_size:        256
train_stride:      256

batch_size:        16
epochs:            20
grad_accum_steps:  1
learning_rate:     8.0e-4
min_lr:            1.0e-5
warmup_steps:      50
weight_decay:      0.1
label_smoothing:   0.0
gradient_clip:     1.0
log_every:         20
eval_every:        100
save_every:        500
keep_checkpoints:  3
early_stop_patience: 8

model_size:             slm-6m
embed_dim:              256
num_heads:              8
num_kv_heads:           2
num_layers:             6
dropout:                0.1
attn_dropout:           0.05
ffn_dropout:            0.1
norm_eps:               1.0e-6
init_scale:             0.02
rope_base:              10000
cache_factor:           4
use_kv_cache:           true
tie_weights:            true
ffn_multiplier:         2.6667
multiple_of:            64
gradient_checkpointing: false
compile_model:          false
use_flash:              false

max_new_tokens:      200
temperature:         0.8
top_k:               40
top_p:               0.92
repetition_penalty:  1.3
repetition_window:   64

enable_safety_filter: true
safety_keywords:
  - bomb
  - kill
  - hack
  - exploit
  - malware
  - suicide

seed:             42
mixed_precision:  auto
num_workers:      0
pin_memory:       false

use_tensorboard:  true
use_wandb:        false
wandb_project:    slm_project

rag_enabled:                false
rag_vector_store_path:      out/vector_store
rag_top_k:                  5
rag_chunk_size:             500
rag_chunk_overlap:          100
rag_use_web_search:         false
rag_web_search_num_results: 3
rag_web_search_max_chars:   2000
rag_embedding_layer:        mean
rag_embedding_normalize:    true
rag_embedding_batch_size:   32
rag_cache_size:             1000

api_host:              0.0.0.0
api_port:              8000
api_key:               null
rate_limit_per_minute: 60
